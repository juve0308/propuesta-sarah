<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quieres ser mi novia?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #ff9ac8, #ffb6e0, #ffd0ef);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #contenido {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      z-index: 10;
      position: relative;
    }

    h1 {
      color: #fff;
      font-size: clamp(46px, 8vw, 90px);
      text-shadow: 0 0 14px rgba(255, 255, 255, .9);
      margin: 0;
      text-align: center;
      transition: opacity .6s ease, transform .6s ease;
    }

    .botones {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
    }

    .btn {
      padding: 18px 48px;
      border: none;
      border-radius: 50px;
      min-width: 170px;
      background: #ff4fa3;
      color: #fff;
      font-size: clamp(20px, 3vw, 26px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, .18);
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      background: #ff268d;
    }

    #mensaje {
      display: none;
      color: #fff;
      font-size: clamp(54px, 9vw, 115px);
      font-weight: 600;
      text-shadow: 0 0 28px rgba(255, 255, 255, .9);
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      opacity: 0;
      text-align: center;
      line-height: 1.3;
      letter-spacing: 1px;
      animation: mensajeZoom 1s ease forwards;
      transition: transform 1s ease;
      z-index: 15;
    }
    @keyframes mensajeZoom {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .latido {
      animation: latir 2s ease-in-out infinite;
    }
    @keyframes latir {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

    #regalo {
      display: none;
      position: fixed;
      top: 73%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: #ff4fa3;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 22px 55px;
      font-size: clamp(22px, 3.5vw, 28px);
      cursor: pointer;
      opacity: 0;
      text-align: center;
      animation: aparecer 1s ease forwards;
      transition: all .3s ease;
      overflow: hidden;
      width: 80%;
      z-index: 20;
    }

    @keyframes aparecer {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .brillo::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 55px;
      background: linear-gradient(120deg, #fff, #ff69b4, #ffe6f0, #ff69b4, #fff);
      background-size: 400%;
      z-index: -1;
      filter: blur(6px);
      animation: animarBorde 3s linear infinite;
    }

    @keyframes animarBorde {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #regalo:hover {
      background: #ff268d;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .corazon {
      position: fixed;
      color: #fff;
      animation: flotar 5s ease-in infinite;
      pointer-events: none;
      z-index: 5;
    }
    @keyframes flotar {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80vh) scale(1.8); opacity: 0; }
    }

    .sube {
      transform: translate(-50%, calc(-56%)) scale(1);
    }

    /* 🌌 Fondo estrellado (simplificado) */

      display: none;
      position: fixed;
      inset: 0;
